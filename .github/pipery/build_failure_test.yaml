name: docker-build-failure-detected
description: Action must exit non-zero when docker build fails.
source_path: test-project-failing-build
inputs:
  project_path: test-project-failing-build
  image_name: test-broken-build-pipery
  skip_sast: "true"
  skip_sca: "true"
  skip_lint: "true"
  skip_test: "true"
  skip_versioning: "true"
  skip_packaging: "true"
  skip_release: "true"
  skip_reintegration: "true"
expect:
  failure: true
