# GitLab CI Pipeline for pipery-docker-ci
# This is the GitLab CI equivalent of the GitHub Actions Docker CI workflow
# For Docker image building, security scanning, and registry push

variables:
  PROJECT_PATH: "."
  CONFIG_FILE: ".pipery/config.yaml"
  DOCKERFILE: "Dockerfile"
  IMAGE_NAME: ""
  IMAGE_TAG: "latest"
  REGISTRY: "ghcr.io"
  REGISTRY_USERNAME: ""
  REGISTRY_PASSWORD: ""
  BUILD_ARGS: ""
  PLATFORMS: "linux/amd64"
  TESTS_PATH: ""
  SKIP_SAST: "false"
  SKIP_SCA: "false"
  SKIP_LINT: "false"
  SKIP_BUILD: "false"
  SKIP_TEST: "false"
  SKIP_VERSIONING: "false"
  SKIP_PACKAGING: "false"
  SKIP_RELEASE: "false"
  SKIP_REINTEGRATION: "false"
  VERSION_BUMP: "patch"
  GITHUB_TOKEN: ""
  LOG_FILE: "pipery.jsonl"
  TARGET_BRANCH: "main"

stages:
  - checkout
  - setup
  - sast
  - sca
  - lint
  - build
  - test
  - versioning
  - packaging
  - release
  - reintegration
  - logs

checkout:
  stage: checkout
  image: alpine:latest
  script:
    - echo "Repository already checked out by GitLab CI"
    - ls -la

setup:
  stage: setup
  image: docker:latest
  services:
    - docker:dind
  script:
    # Refactored: Call shared script instead of inline logic
    - bash ./src/setup-psh.sh
  env:
    INPUT_LOG_FILE: $LOG_FILE

sast_scan:
  stage: sast
  image: python:3.11-alpine
  script:
    # Refactored: Call shared script instead of inline logic
    - bash ./src/step-sast.sh
  env:
    INPUT_PROJECT_PATH: $PROJECT_PATH
    INPUT_LOG_FILE: $LOG_FILE
  allow_failure: true
  rules:
    - if: '$SKIP_SAST == "true"'
      when: never
    - when: on_success
  artifacts:
    paths:
      - $LOG_FILE
    expire_in: 30 days

sca_scan:
  stage: sca
  image: python:3.11-alpine
  script:
    # Refactored: Call shared script instead of inline logic
    - bash ./src/step-sca.sh
  env:
    INPUT_PROJECT_PATH: $PROJECT_PATH
    INPUT_IMAGE_NAME: $IMAGE_NAME
    INPUT_IMAGE_TAG: $IMAGE_TAG
    INPUT_LOG_FILE: $LOG_FILE
  allow_failure: true
  rules:
    - if: '$SKIP_SCA == "true"'
      when: never
    - when: on_success
  artifacts:
    paths:
      - $LOG_FILE
    expire_in: 30 days

lint:
  stage: lint
  image: hadolint/hadolint:latest
  script:
    # Refactored: Call shared script instead of inline logic
    - bash ./src/step-lint.sh
  env:
    INPUT_PROJECT_PATH: $PROJECT_PATH
    INPUT_DOCKERFILE: $DOCKERFILE
    INPUT_LOG_FILE: $LOG_FILE
  rules:
    - if: '$SKIP_LINT == "true"'
      when: never
    - when: on_success
  allow_failure: true

build:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    # Refactored: Call shared script instead of inline logic
    - bash ./src/step-build.sh
  env:
    INPUT_PROJECT_PATH: $PROJECT_PATH
    INPUT_DOCKERFILE: $DOCKERFILE
    INPUT_IMAGE_NAME: $IMAGE_NAME
    INPUT_IMAGE_TAG: $IMAGE_TAG
    INPUT_BUILD_ARGS: $BUILD_ARGS
    INPUT_LOG_FILE: $LOG_FILE
  rules:
    - if: '$SKIP_BUILD == "true"'
      when: never
    - when: on_success
  artifacts:
    expire_in: 1 day

test:
  stage: test
  image: docker:latest
  services:
    - docker:dind
  dependencies:
    - build
  script:
    # Refactored: Call shared script instead of inline logic
    - bash ./src/step-test.sh
  env:
    INPUT_IMAGE_NAME: $IMAGE_NAME
    INPUT_IMAGE_TAG: $IMAGE_TAG
    INPUT_TESTS_PATH: $TESTS_PATH
    INPUT_LOG_FILE: $LOG_FILE
  rules:
    - if: '$SKIP_TEST == "true"'
      when: never
    - when: on_success
  allow_failure: true

versioning:
  stage: versioning
  image: python:3.11-alpine
  script:
    # Refactored: Call shared script instead of inline logic
    - bash ./src/step-version.sh
  env:
    INPUT_PROJECT_PATH: $PROJECT_PATH
    INPUT_VERSION_BUMP: $VERSION_BUMP
    INPUT_LOG_FILE: $LOG_FILE
  rules:
    - if: '$SKIP_VERSIONING == "true"'
      when: never
    - when: on_success
  artifacts:
    paths:
      - version_info.txt
      - $LOG_FILE
    expire_in: 30 days

packaging:
  stage: packaging
  image: docker:latest
  services:
    - docker:dind
  dependencies:
    - build
    - versioning
  script:
    # Refactored: Call shared script instead of inline logic
    - bash ./src/step-package.sh
  env:
    INPUT_IMAGE_NAME: $IMAGE_NAME
    INPUT_IMAGE_TAG: $IMAGE_TAG
    INPUT_LOG_FILE: $LOG_FILE
  rules:
    - if: '$SKIP_PACKAGING == "true"'
      when: never
    - when: on_success

release:
  stage: release
  image: docker:latest
  services:
    - docker:dind
  dependencies:
    - versioning
    - packaging
  script:
    # Refactored: Call shared script instead of inline logic
    - bash ./src/step-release.sh
  env:
    INPUT_REGISTRY: $REGISTRY
    INPUT_REGISTRY_USERNAME: $REGISTRY_USERNAME
    INPUT_REGISTRY_PASSWORD: $REGISTRY_PASSWORD
    INPUT_IMAGE_NAME: $IMAGE_NAME
    INPUT_IMAGE_TAG: $IMAGE_TAG
    INPUT_LOG_FILE: $LOG_FILE
    GITHUB_SHA: $CI_COMMIT_SHA
  rules:
    - if: '$SKIP_RELEASE == "true"'
      when: never
    - if: '$CI_COMMIT_BRANCH == $TARGET_BRANCH'
      when: on_success
    - when: manual
  only:
    - branches

reintegration:
  stage: reintegration
  image: alpine:latest
  script:
    # Refactored: Call shared script instead of inline logic
    - bash ./src/step-reintegrate.sh
  env:
    INPUT_PROJECT_PATH: $PROJECT_PATH
    INPUT_LOG_FILE: $LOG_FILE
    INPUT_TARGET_BRANCH: $TARGET_BRANCH
    INPUT_GITHUB_TOKEN: $GITHUB_TOKEN
    GITHUB_TOKEN: $GITHUB_TOKEN
  rules:
    - if: '$SKIP_REINTEGRATION == "true"'
      when: never
    - if: '$CI_COMMIT_BRANCH == $TARGET_BRANCH'
      when: on_success
    - when: manual
  allow_failure: true

publish_logs:
  stage: logs
  image: alpine:latest
  script:
    - echo "Collecting logs and artifacts..."
    - |
      if [ -f "$LOG_FILE" ]; then
        echo "Log file size: $(wc -c < $LOG_FILE) bytes"
      fi
  artifacts:
    paths:
      - $LOG_FILE
      - version_info.txt
    expire_in: 90 days
  when: always
