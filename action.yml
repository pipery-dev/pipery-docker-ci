name: 'Pipery Docker CI'
description: 'CI pipeline for Docker: lint (hadolint), SAST, SCA, build, test, versioning, push image, reintegration'
inputs:
  project_path:
    description: 'Path to the project source tree.'
    required: false
    default: '.'
  config_file:
    description: 'Path to a config file for the action.'
    required: false
    default: ''
  dockerfile:
    description: 'Dockerfile name relative to project_path.'
    required: false
    default: 'Dockerfile'
  image_name:
    description: 'Name of the Docker image to build.'
    required: false
    default: ''
  image_tag:
    description: 'Tag for the Docker image.'
    required: false
    default: 'latest'
  registry:
    description: 'Container registry host.'
    required: false
    default: 'ghcr.io'
  registry_username:
    description: 'Username for registry login.'
    required: false
    default: ''
  registry_password:
    description: 'Password or token for registry login.'
    required: false
    default: ''
  skip_sast:
    description: 'Skip the SAST step.'
    required: false
    default: 'false'
  skip_sca:
    description: 'Skip the SCA step.'
    required: false
    default: 'false'
  skip_lint:
    description: 'Skip the hadolint step.'
    required: false
    default: 'false'
  skip_build:
    description: 'Skip the Docker build step.'
    required: false
    default: 'false'
  tests_path:
    description: 'Command or script to run inside the container for testing. Defaults to a smoke test.'
    required: false
    default: ''
  skip_test:
    description: 'Skip the container smoke test step.'
    required: false
    default: 'false'
  skip_versioning:
    description: 'Skip the versioning step.'
    required: false
    default: 'false'
  skip_packaging:
    description: 'Skip the packaging (image tagging) step.'
    required: false
    default: 'false'
  skip_release:
    description: 'Skip the release (registry push) step.'
    required: false
    default: 'false'
  skip_reintegration:
    description: 'Skip the reintegration step.'
    required: false
    default: 'false'
  version_bump:
    description: 'Version bump type: patch, minor, or major.'
    required: false
    default: 'patch'
  github_token:
    description: 'GitHub token for reintegration.'
    required: false
    default: ''
  log_file:
    description: 'Path to the JSONL log file.'
    required: false
    default: 'pipery.jsonl'
  build_args:
    description: 'Comma-separated list of build args in VAR=val format.'
    required: false
    default: ''
  platforms:
    description: 'Platforms to build for.'
    required: false
    default: 'linux/amd64'
runs:
  using: composite
  steps:
    - id: main
      shell: bash
      run: |
        set -euo pipefail
        project_path="${INPUT_PROJECT_PATH:-${PIPERY_TEST_PROJECT_PATH:-.}}"
        log_path="${PIPERY_LOG_PATH:-pipery.jsonl}"
        if [ ! -d "$project_path" ]; then
          echo "Expected project path to exist: $project_path" >&2
          exit 1
        fi
        printf '{"event":"build","status":"success","project_path":"%s"}\n' "$project_path" > "$log_path"
        echo "Implement your action logic here for $project_path."
branding:
  icon: package
  color: blue
