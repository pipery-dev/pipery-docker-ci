# ============================================================================
# Bitbucket Pipelines Configuration for pipery-docker-ci
# Production-Ready Docker Image CI Pipeline
# ============================================================================
#
# SETUP INSTRUCTIONS:
# 1. Copy this file to pipery-docker-ci repository root as bitbucket-pipelines.yml
# 2. Configure Protected Variables in Bitbucket
# 3. Set SKIP_* variables to 'true' to disable specific stages
#
# PROTECTED VARIABLES TO CONFIGURE:
# - REGISTRY_PASSWORD: Docker registry authentication token (Mark as Secured)
# - GITHUB_TOKEN: GitHub API token for reintegration (Mark as Secured)

definitions:
  steps:
    - step: &checkout-step
        name: Checkout Repository
        image: alpine:latest
        script:
          - echo "Repository checked out by Bitbucket Pipelines"
          - ls -la

    - step: &setup-step
        name: Setup Docker Environment
        image: docker:latest
        services:
          - docker
        script:
          # Refactored: Call shared script instead of inline logic
          - bash ./src/setup-psh.sh
        env:
          INPUT_LOG_FILE: ${LOG_FILE:-pipery.jsonl}

    - step: &sast-scan
        name: SAST Security Scan
        image: python:3.11-alpine
        script:
          # Refactored: Call shared script instead of inline logic
          - bash ./src/step-sast.sh
        env:
          INPUT_PROJECT_PATH: ${PROJECT_PATH:-.}
          INPUT_LOG_FILE: ${LOG_FILE:-pipery.jsonl}
        artifacts:
          - ${LOG_FILE:-pipery.jsonl}

    - step: &sca-scan
        name: SCA Dependency Scan
        image: python:3.11-alpine
        script:
          # Refactored: Call shared script instead of inline logic
          - bash ./src/step-sca.sh
        env:
          INPUT_PROJECT_PATH: ${PROJECT_PATH:-.}
          INPUT_IMAGE_NAME: ${IMAGE_NAME}
          INPUT_IMAGE_TAG: ${IMAGE_TAG:-latest}
          INPUT_LOG_FILE: ${LOG_FILE:-pipery.jsonl}
        artifacts:
          - ${LOG_FILE:-pipery.jsonl}

    - step: &lint-step
        name: Dockerfile Linting
        image: hadolint/hadolint:latest
        script:
          # Refactored: Call shared script instead of inline logic
          - bash ./src/step-lint.sh
        env:
          INPUT_PROJECT_PATH: ${PROJECT_PATH:-.}
          INPUT_DOCKERFILE: ${DOCKERFILE:-Dockerfile}
          INPUT_LOG_FILE: ${LOG_FILE:-pipery.jsonl}

    - step: &build-step
        name: Build Docker Image
        image: docker:latest
        services:
          - docker
        script:
          # Refactored: Call shared script instead of inline logic
          - bash ./src/step-build.sh
        env:
          INPUT_PROJECT_PATH: ${PROJECT_PATH:-.}
          INPUT_DOCKERFILE: ${DOCKERFILE:-Dockerfile}
          INPUT_IMAGE_NAME: ${IMAGE_NAME}
          INPUT_IMAGE_TAG: ${IMAGE_TAG:-latest}
          INPUT_BUILD_ARGS: ${BUILD_ARGS}
          INPUT_LOG_FILE: ${LOG_FILE:-pipery.jsonl}

    - step: &test-step
        name: Container Smoke Tests
        image: docker:latest
        services:
          - docker
        script:
          # Refactored: Call shared script instead of inline logic
          - bash ./src/step-test.sh
        env:
          INPUT_IMAGE_NAME: ${IMAGE_NAME}
          INPUT_IMAGE_TAG: ${IMAGE_TAG:-latest}
          INPUT_TESTS_PATH: ${TESTS_PATH}
          INPUT_LOG_FILE: ${LOG_FILE:-pipery.jsonl}

    - step: &versioning-step
        name: Version Bump & Tag
        image: python:3.11-alpine
        script:
          # Refactored: Call shared script instead of inline logic
          - bash ./src/step-version.sh
        env:
          INPUT_PROJECT_PATH: ${PROJECT_PATH:-.}
          INPUT_VERSION_BUMP: ${VERSION_BUMP:-patch}
          INPUT_LOG_FILE: ${LOG_FILE:-pipery.jsonl}
        artifacts:
          - version_info.txt
          - ${LOG_FILE:-pipery.jsonl}

    - step: &packaging-step
        name: Tag Container Image
        image: docker:latest
        services:
          - docker
        script:
          # Refactored: Call shared script instead of inline logic
          - bash ./src/step-package.sh
        env:
          INPUT_IMAGE_NAME: ${IMAGE_NAME}
          INPUT_IMAGE_TAG: ${IMAGE_TAG:-latest}
          INPUT_LOG_FILE: ${LOG_FILE:-pipery.jsonl}

    - step: &release-step
        name: Release to Registry
        image: docker:latest
        services:
          - docker
        trigger: manual
        script:
          # Refactored: Call shared script instead of inline logic
          - bash ./src/step-release.sh
        env:
          INPUT_REGISTRY: ${REGISTRY:-ghcr.io}
          INPUT_REGISTRY_USERNAME: ${REGISTRY_USERNAME}
          INPUT_REGISTRY_PASSWORD: ${REGISTRY_PASSWORD}
          INPUT_IMAGE_NAME: ${IMAGE_NAME}
          INPUT_IMAGE_TAG: ${IMAGE_TAG:-latest}
          INPUT_LOG_FILE: ${LOG_FILE:-pipery.jsonl}

    - step: &reintegration-step
        name: Reintegration to Target Branch
        image: alpine:latest
        trigger: manual
        script:
          # Refactored: Call shared script instead of inline logic
          - bash ./src/step-reintegrate.sh
        env:
          INPUT_PROJECT_PATH: ${PROJECT_PATH:-.}
          INPUT_LOG_FILE: ${LOG_FILE:-pipery.jsonl}
          INPUT_TARGET_BRANCH: ${TARGET_BRANCH:-main}
          GITHUB_TOKEN: ${GITHUB_TOKEN}

    - step: &logs-step
        name: Collect & Archive Logs
        image: alpine:latest
        script:
          - echo "Collecting logs and artifacts..."
          - |
            if [ -f "${LOG_FILE:-pipery.jsonl}" ]; then
              echo "Log file size: $(wc -c < ${LOG_FILE:-pipery.jsonl}) bytes"
            fi
        artifacts:
          - ${LOG_FILE:-pipery.jsonl}
          - version_info.txt

    - step: &dashboard-link
        name: Pipery Dashboard Link
        image: alpine:latest
        optional: true
        max-time: 5
        script:
          - echo "=================================================="
          - echo "Pipery Dashboard Link Generator"
          - echo "=================================================="
          - echo ""
          - # Construct artifact URL using Bitbucket's build endpoint
          - ARTIFACT_URL="https://bitbucket.org/${BITBUCKET_REPO_FULL_NAME}/pipelines/${BITBUCKET_BUILD_NUMBER}"
          - ""
          - # URL encode using Python (if available) or fall back to direct URL
          - ENCODED_ARTIFACT=$(python3 -c "import sys, urllib.parse; print(urllib.parse.quote('${ARTIFACT_URL}'))" 2>/dev/null || echo "${ARTIFACT_URL}")
          - ""
          - # Create dashboard URL
          - DASHBOARD_URL="https://dash.pipery.dev/?artifact=${ENCODED_ARTIFACT}"
          - ""
          - echo "Build Information:"
          - echo "  Repository: $BITBUCKET_REPO_FULL_NAME"
          - echo "  Build: $BITBUCKET_BUILD_NUMBER"
          - echo "  Branch: $BITBUCKET_BRANCH"
          - echo "  Commit: $BITBUCKET_COMMIT"
          - echo ""
          - echo "Artifact URL:"
          - echo "  $ARTIFACT_URL"
          - echo ""
          - echo "Dashboard Link:"
          - echo "[View in Pipery Dashboard]($DASHBOARD_URL)"
          - echo ""
          - |
            cat > dashboard-link.txt << 'DASHBOARD_EOF'
            # Pipery Dashboard Link

            Repository: $BITBUCKET_REPO_FULL_NAME
            Build: $BITBUCKET_BUILD_NUMBER
            Branch: $BITBUCKET_BRANCH
            Commit: $BITBUCKET_COMMIT
            Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)

            ## Dashboard
            [View in Pipery Dashboard]($DASHBOARD_URL)

            ## Direct Links
            - Bitbucket Build: https://bitbucket.org/${BITBUCKET_REPO_FULL_NAME}/pipelines/${BITBUCKET_BUILD_NUMBER}
            DASHBOARD_EOF
          - echo "Dashboard link info saved to dashboard-link.txt"
          - echo "=================================================="
        artifacts:
          - dashboard-link.txt


variables:
  # Build Configuration
  PROJECT_PATH: "."
  CONFIG_FILE: ".pipery/config.yaml"
  DOCKERFILE: "Dockerfile"
  IMAGE_NAME: ""  # REQUIRED: e.g., ghcr.io/myorg/myapp
  IMAGE_TAG: "latest"
  BUILD_ARGS: ""  # Comma-separated VAR=val

  # Test Configuration
  TESTS_PATH: ""  # Container smoke test command

  # Feature Flags
  SKIP_SAST: "false"
  SKIP_SCA: "false"
  SKIP_LINT: "false"
  SKIP_BUILD: "false"
  SKIP_TEST: "false"
  SKIP_VERSIONING: "false"
  SKIP_PACKAGING: "false"
  SKIP_RELEASE: "false"
  SKIP_REINTEGRATION: "false"

  # Release Configuration
  VERSION_BUMP: "patch"
  REGISTRY: "ghcr.io"
  REGISTRY_USERNAME: ""

  # Logging & Tracking
  LOG_FILE: "pipery.jsonl"
  TARGET_BRANCH: "main"

pipelines:
  default:
    - step: *checkout-step
    - step: *setup-step
    - parallel:
        - step: *sast-scan
        - step: *sca-scan
    - step:
        <<: *lint-step
        condition:
          variable:
            - SKIP_LINT = "false"
        optional: true
    - step:
        <<: *build-step
        condition:
          variable:
            - SKIP_BUILD = "false"
    - step:
        <<: *test-step
        condition:
          variable:
            - SKIP_TEST = "false"
        optional: true
    - step:
        <<: *versioning-step
        condition:
          variable:
            - SKIP_VERSIONING = "false"
    - step:
        <<: *packaging-step
        condition:
          variable:
            - SKIP_PACKAGING = "false"
    - step: *logs-step
    - step: *dashboard-link

  branches:
    main:
      - step: *checkout-step
      - step: *setup-step
      - parallel:
          - step: *sast-scan
          - step: *sca-scan
      - step:
          <<: *lint-step
          condition:
            variable:
              - SKIP_LINT = "false"
          optional: true
      - step:
          <<: *build-step
          condition:
            variable:
              - SKIP_BUILD = "false"
      - step:
          <<: *test-step
          condition:
            variable:
              - SKIP_TEST = "false"
          optional: true
      - step:
          <<: *versioning-step
          condition:
            variable:
              - SKIP_VERSIONING = "false"
      - step:
          <<: *packaging-step
          condition:
            variable:
              - SKIP_PACKAGING = "false"
      - step:
          <<: *release-step
          condition:
            variable:
              - SKIP_RELEASE = "false"
      - step:
          <<: *reintegration-step
          condition:
            variable:
              - SKIP_REINTEGRATION = "false"
          optional: true
      - step: *logs-step
    - step: *dashboard-link

  pull-requests:
    feature/**:
      - step: *checkout-step
      - step: *setup-step
      - parallel:
          - step: *sast-scan
          - step: *sca-scan
      - step:
          <<: *lint-step
          condition:
            variable:
              - SKIP_LINT = "false"
          optional: true
      - step:
          <<: *build-step
          condition:
            variable:
              - SKIP_BUILD = "false"
      - step:
          <<: *test-step
          condition:
            variable:
              - SKIP_TEST = "false"
          optional: true
      - step: *logs-step
    - step: *dashboard-link

  custom:
    release:
      - step: *checkout-step
      - step: *setup-step
      - parallel:
          - step: *sast-scan
          - step: *sca-scan
      - step:
          <<: *lint-step
          condition:
            variable:
              - SKIP_LINT = "false"
          optional: true
      - step:
          <<: *build-step
          condition:
            variable:
              - SKIP_BUILD = "false"
      - step:
          <<: *test-step
          condition:
            variable:
              - SKIP_TEST = "false"
          optional: true
      - step:
          <<: *versioning-step
          condition:
            variable:
              - SKIP_VERSIONING = "false"
      - step:
          <<: *packaging-step
          condition:
            variable:
              - SKIP_PACKAGING = "false"
      - step:
          <<: *release-step
          condition:
            variable:
              - SKIP_RELEASE = "false"
      - step:
          <<: *reintegration-step
          condition:
            variable:
              - SKIP_REINTEGRATION = "false"
          optional: true
      - step: *logs-step
